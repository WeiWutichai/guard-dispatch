# =============================================================================
# Nginx Gateway — PRODUCTION / STAGING
# Security Guard Dispatch System
#
# Differences from nginx.conf (dev):
#   - HTTP (80) is redirect-only (+ Let's Encrypt ACME webroot)
#   - HTTPS (443) handles all traffic with TLS 1.2/1.3
#   - HSTS enabled (1 year)
#   - Swagger UI locations REMOVED (CLAUDE.md: must 404 in production)
#   - server_name bound to pguard.innoveraappcenter.com
#
# Mounted from host:
#   /etc/letsencrypt            → /etc/letsencrypt (read-only)
#   /var/www/certbot            → /var/www/certbot (read-only, for webroot renewal)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    server_tokens off;

    # Global default max body size — prevents large payload attacks on
    # endpoints that don't explicitly override (e.g., chat upload sets 10m).
    client_max_body_size 1m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=otp_limit:10m  rate=3r/m;

    # Upstream Services
    upstream auth_service {
        server rust-auth:3001;
        keepalive 32;
    }
    upstream booking_service {
        server rust-booking:3002;
        keepalive 32;
    }
    upstream tracking_service {
        server rust-tracking:3003;
        keepalive 32;
    }
    upstream notification_service {
        server rust-notification:3004;
        keepalive 32;
    }
    upstream chat_service {
        server rust-chat:3006;
        keepalive 32;
    }
    upstream web_admin {
        server web-admin:3000;
        keepalive 16;
    }
    # mediasoup upstream uses variable-based proxy_pass — see /call/ location.

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================================
    # HTTP server — redirect everything to HTTPS + serve Let's Encrypt ACME
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name pguard.innoveraappcenter.com;

        # Let's Encrypt HTTP-01 challenge (for certbot renewal via webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS server — all traffic goes here
    # =========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name pguard.innoveraappcenter.com;

        ssl_certificate     /etc/letsencrypt/live/pguard.innoveraappcenter.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pguard.innoveraappcenter.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;

        # =====================================================================
        # API Endpoints
        # =====================================================================

        # OTP endpoints — very strict rate limit (3 req/min per IP)
        location /auth/otp/ {
            limit_req zone=otp_limit burst=2 nodelay;
            proxy_pass http://auth_service/otp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO presigned URL proxy — allows browsers to load guard document images.
        # Host is forced to "minio:9000" so MinIO validates the presigned signature.
        location /minio-files/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host "minio:9000";
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Guard profile submission — larger body for document images (10MB)
        location /auth/profile/ {
            limit_req zone=auth_limit burst=5 nodelay;
            client_max_body_size 10m;
            proxy_pass http://auth_service/profile/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoints
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Booking — assignment progress report uploads (images 10MB + video 200MB)
        # Cap is 5MB above the app-level MAX_VIDEO_SIZE so large requests
        # reach the app and get a clean "File too large" error instead of
        # nginx's blunt 413.
        location /booking/assignments/ {
            limit_req zone=api_limit burst=50 nodelay;
            client_max_body_size 205m;
            proxy_pass http://booking_service/assignments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Booking endpoints
        location /booking/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://booking_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Assignment Status — WebSocket (real-time updates)
        location /ws/assignments {
            limit_req zone=ws_limit burst=10 nodelay;
            proxy_pass http://booking_service/ws/assignments;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # GPS Tracking — WebSocket
        location /ws/track {
            limit_req zone=ws_limit burst=10 nodelay;
            proxy_pass http://tracking_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Notification endpoints
        location /notification/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MediaSoup signaling (variable proxy_pass — resolves at request time,
        # so nginx starts even when mediasoup-server is unavailable)
        location /call/ {
            limit_req zone=api_limit burst=20 nodelay;
            resolver 127.0.0.11 valid=30s;
            set $mediasoup_upstream http://mediasoup-server:3005;
            proxy_pass $mediasoup_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Chat — WebSocket
        location /ws/chat {
            limit_req zone=ws_limit burst=20 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Chat REST (attachments — image 10MB, video 200MB)
        location /chat/ {
            limit_req zone=api_limit burst=50 nodelay;
            client_max_body_size 205m;
            proxy_pass http://chat_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tracking REST endpoints
        location /tracking/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://tracking_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =====================================================================
        # Swagger UI — INTENTIONALLY OMITTED IN PRODUCTION
        # (CLAUDE.md: Swagger must 404 in staging/production)
        # Services also gate Swagger via ENABLE_SWAGGER env var; omitting the
        # nginx locations provides a second layer of defense.
        # =====================================================================

        # =====================================================================
        # Admin Portal (Next.js)
        # =====================================================================
        location /p-guard-app {
            proxy_pass http://web_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /p-guard-app/_next {
            proxy_pass http://web_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Root redirect to admin portal
        location = / {
            return 302 /p-guard-app;
        }

        # Health check (public, used by uptime monitors)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
