# =============================================================================
# Nginx Gateway — Security Guard Dispatch System
# Reverse Proxy + Rate Limiting + WebSocket Support
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m   rate=5r/s;

    # Upstream Services
    upstream auth_service {
        server rust-auth:3001;
        keepalive 32;
    }

    upstream booking_service {
        server rust-booking:3002;
        keepalive 32;
    }

    upstream tracking_service {
        server rust-tracking:3003;
        keepalive 32;
    }

    upstream notification_service {
        server rust-notification:3004;
        keepalive 32;
    }

    upstream mediasoup_service {
        server mediasoup-server:3005;
        keepalive 16;
    }

    upstream chat_service {
        server rust-chat:3006;
        keepalive 32;
    }

    upstream web_admin {
        server web-admin:3000;
        keepalive 16;
    }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP Server
    server {
        listen 80;
        server_name _;

        # TODO: Uncomment for HTTPS redirect in production
        # return 301 https://$host$request_uri;

        # Auth endpoints
        location /auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Booking endpoints
        location /booking/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://booking_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # GPS Tracking — WebSocket
        location /ws/track {
            limit_req zone=ws_limit burst=10 nodelay;
            proxy_pass http://tracking_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Notification endpoints
        location /notification/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # MediaSoup signaling
        location /call/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://mediasoup_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Chat — WebSocket + REST (attachments)
        location /ws/chat {
            limit_req zone=ws_limit burst=20 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /chat/ {
            limit_req zone=api_limit burst=50 nodelay;
            # Max body size for image uploads (10MB per CLAUDE.md)
            client_max_body_size 10m;
            proxy_pass http://chat_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Tracking REST endpoints
        location /tracking/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://tracking_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin Portal (Next.js)
        location /pguard-app {
            proxy_pass http://web_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /pguard-app/_next {
            proxy_pass http://web_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Root redirect to admin portal
        location = / {
            return 302 /pguard-app;
        }

        # Health check
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS Server (uncomment when SSL certs are ready)
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... same locations as HTTP
    # }
}
