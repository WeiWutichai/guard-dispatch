# =============================================================================
# Nginx Gateway — Security Guard Dispatch System
# Reverse Proxy + Security Headers + Rate Limiting + WebSocket Support
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Hide Nginx version
    server_tokens off;

    # Global default max body size — prevents large payload attacks on
    # endpoints that don't explicitly override (e.g., chat upload sets 10m).
    client_max_body_size 1m;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate Limiting Zones
    # Auth: stricter limit to prevent brute-force (5 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m   rate=5r/s;
    # OTP: very strict limit to prevent abuse (3 req/min per IP)
    limit_req_zone $binary_remote_addr zone=otp_limit:10m  rate=3r/m;

    # Upstream Services
    upstream auth_service {
        server rust-auth:3001;
        keepalive 32;
    }

    upstream booking_service {
        server rust-booking:3002;
        keepalive 32;
    }

    upstream tracking_service {
        server rust-tracking:3003;
        keepalive 32;
    }

    upstream notification_service {
        server rust-notification:3004;
        keepalive 32;
    }

    # mediasoup upstream uses variable-based proxy_pass (see /call/ location)
    # so nginx starts even when mediasoup-server is down.

    upstream chat_service {
        server rust-chat:3006;
        keepalive 32;
    }

    upstream web_admin {
        server web-admin:3000;
        keepalive 16;
    }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================================
    # Security Headers (applied to all responses)
    # =========================================================================
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy — don't leak full URL to external sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions policy — restrict browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # HTTP Server (development + HTTPS redirect in production)
    server {
        listen 80;
        server_name _;

        # Uncomment in production to force HTTPS:
        # return 301 https://$host$request_uri;

        # =====================================================================
        # API Endpoints
        # =====================================================================

        # OTP endpoints — very strict rate limit (3 req/min per IP)
        location /auth/otp/ {
            limit_req zone=otp_limit burst=2 nodelay;
            proxy_pass http://auth_service/otp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO presigned URL proxy — allows browsers to load guard document images.
        # Host is forced to "minio:9000" so MinIO validates the presigned signature
        # (the signature was generated with that host value).
        location /minio-files/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host "minio:9000";
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Guard profile submission — larger body for document images (10MB)
        location /auth/profile/ {
            limit_req zone=auth_limit burst=5 nodelay;
            client_max_body_size 10m;
            proxy_pass http://auth_service/profile/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoints — stricter rate limit
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Booking endpoints
        location /booking/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://booking_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Assignment Status — WebSocket (real-time updates)
        location /ws/assignments {
            limit_req zone=ws_limit burst=10 nodelay;
            proxy_pass http://booking_service/ws/assignments;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # GPS Tracking — WebSocket
        location /ws/track {
            limit_req zone=ws_limit burst=10 nodelay;
            proxy_pass http://tracking_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Notification endpoints
        location /notification/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MediaSoup signaling (variable proxy_pass — resolves at request time,
        # so nginx starts even when mediasoup-server is unavailable)
        location /call/ {
            limit_req zone=api_limit burst=20 nodelay;
            resolver 127.0.0.11 valid=30s;
            set $mediasoup_upstream http://mediasoup-server:3005;
            proxy_pass $mediasoup_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Chat — WebSocket + REST (attachments)
        location /ws/chat {
            limit_req zone=ws_limit burst=20 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /chat/ {
            limit_req zone=api_limit burst=50 nodelay;
            # Max body size for image uploads (10MB per CLAUDE.md)
            client_max_body_size 10m;
            proxy_pass http://chat_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tracking REST endpoints
        location /tracking/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://tracking_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =====================================================================
        # Swagger UI (per-service API docs)
        # Disable in production by setting DISABLE_SWAGGER env var
        # =====================================================================

        # Auth Swagger (rate-limited to prevent scraping/abuse)
        location = /auth/swagger-ui {
            limit_req zone=api_limit burst=10 nodelay;
            return 301 /auth/swagger-ui/;
        }
        location /auth/swagger-ui/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://auth_service/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /auth/api-docs/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://auth_service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Booking Swagger
        location = /booking/swagger-ui {
            limit_req zone=api_limit burst=10 nodelay;
            return 301 /booking/swagger-ui/;
        }
        location /booking/swagger-ui/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://booking_service/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /booking/api-docs/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://booking_service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Tracking Swagger
        location = /tracking/swagger-ui {
            limit_req zone=api_limit burst=10 nodelay;
            return 301 /tracking/swagger-ui/;
        }
        location /tracking/swagger-ui/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://tracking_service/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /tracking/api-docs/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://tracking_service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Notification Swagger
        location = /notification/swagger-ui {
            limit_req zone=api_limit burst=10 nodelay;
            return 301 /notification/swagger-ui/;
        }
        location /notification/swagger-ui/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://notification_service/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /notification/api-docs/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://notification_service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Chat Swagger
        location = /chat/swagger-ui {
            limit_req zone=api_limit burst=10 nodelay;
            return 301 /chat/swagger-ui/;
        }
        location /chat/swagger-ui/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://chat_service/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /chat/api-docs/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://chat_service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =====================================================================
        # Admin Portal (Next.js)
        # =====================================================================
        location /pguard-app {
            proxy_pass http://web_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /pguard-app/_next {
            proxy_pass http://web_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Root redirect to admin portal
        location = / {
            return 302 /pguard-app;
        }

        # Health check
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # =========================================================================
    # HTTPS Server (enable when SSL certs are ready)
    # =========================================================================
    # To enable:
    # 1. Place cert.pem and key.pem in ./nginx/ssl/
    # 2. Uncomment the block below
    # 3. Uncomment "return 301 https://..." in HTTP server above
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     # HSTS — tell browsers to always use HTTPS (1 year)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # Same security headers as HTTP server
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #     add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    #
    #     # ... same location blocks as HTTP server above
    # }
}
