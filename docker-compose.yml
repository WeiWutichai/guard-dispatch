version: "3.9"

# =============================================================================
# Security Guard Dispatch System — Docker Compose
# 11 Containers: nginx, auth, booking, tracking, notification, mediasoup,
#                chat, postgres, redis-cache, redis-pubsub, minio
# =============================================================================

x-rust-common: &rust-common
  restart: unless-stopped
  env_file:
    - .env
  depends_on:
    postgres-db:
      condition: service_healthy
    redis-cache:
      condition: service_healthy
    redis-pubsub:
      condition: service_healthy
  networks:
    - backend

services:

  # ---------------------------------------------------------------------------
  # Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - rust-auth
      - rust-booking
      - rust-tracking
      - rust-notification
      - rust-chat
      - mediasoup-server
    networks:
      - backend
      - frontend

  # ---------------------------------------------------------------------------
  # Auth Service (Rust + Axum)
  # ---------------------------------------------------------------------------
  rust-auth:
    <<: *rust-common
    container_name: rust-auth
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - RUST_LOG=${RUST_LOG:-info}

  # ---------------------------------------------------------------------------
  # Booking Service (Rust + Axum)
  # ---------------------------------------------------------------------------
  rust-booking:
    <<: *rust-common
    container_name: rust-booking
    build:
      context: .
      dockerfile: services/booking/Dockerfile
    ports:
      - "${BOOKING_SERVICE_PORT:-3002}:3002"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RUST_LOG=${RUST_LOG:-info}

  # ---------------------------------------------------------------------------
  # Tracking Service (Rust + Axum + WebSocket)
  # ---------------------------------------------------------------------------
  rust-tracking:
    <<: *rust-common
    container_name: rust-tracking
    build:
      context: .
      dockerfile: services/tracking/Dockerfile
    ports:
      - "${TRACKING_SERVICE_PORT:-3003}:3003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL}
      - REDIS_PUBSUB_URL=${REDIS_PUBSUB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RUST_LOG=${RUST_LOG:-info}

  # ---------------------------------------------------------------------------
  # Notification Service (Rust + Axum + FCM)
  # ---------------------------------------------------------------------------
  rust-notification:
    <<: *rust-common
    container_name: rust-notification
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3004}:3004"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL}
      - REDIS_PUBSUB_URL=${REDIS_PUBSUB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID}
      - RUST_LOG=${RUST_LOG:-info}

  # ---------------------------------------------------------------------------
  # MediaSoup Server (Node.js — Video/Audio Call)
  # ---------------------------------------------------------------------------
  mediasoup-server:
    container_name: mediasoup-server
    restart: unless-stopped
    build:
      context: services/mediasoup
      dockerfile: Dockerfile
    ports:
      - "${MEDIASOUP_PORT:-3005}:3005"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-49999}:40000-49999/udp"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - MEDIASOUP_LISTEN_IP=${MEDIASOUP_LISTEN_IP:-0.0.0.0}
      - MEDIASOUP_ANNOUNCED_IP=${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      - MEDIASOUP_RTC_MIN_PORT=${MEDIASOUP_RTC_MIN_PORT:-40000}
      - MEDIASOUP_RTC_MAX_PORT=${MEDIASOUP_RTC_MAX_PORT:-49999}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Chat Service (Rust + Axum + WebSocket + MinIO)
  # ---------------------------------------------------------------------------
  rust-chat:
    <<: *rust-common
    container_name: rust-chat
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    ports:
      - "${CHAT_SERVICE_PORT:-3006}:3006"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL}
      - REDIS_PUBSUB_URL=${REDIS_PUBSUB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-guard_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-guard_pass}
      - POSTGRES_DB=${POSTGRES_DB:-guard_dispatch_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guard_user} -d ${POSTGRES_DB:-guard_dispatch_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Redis Pub/Sub (GPS Tracking + Chat)
  # ---------------------------------------------------------------------------
  redis-pubsub:
    image: redis:7-alpine
    container_name: redis-pubsub
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - redis_pubsub_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # MinIO — Object Storage (Dev: MinIO | Prod: Cloudflare R2)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata:
    driver: local
  redis_cache_data:
    driver: local
  redis_pubsub_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
