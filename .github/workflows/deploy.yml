name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Build & Push Docker Images
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      # Don't let one service's failure cancel the others — surface all real
      # build errors in a single run instead of chasing them one at a time.
      fail-fast: false
      matrix:
        include:
          # Rust services share a workspace root — context must be the repo
          # root so their Dockerfiles can COPY services/*/Cargo.toml etc.
          - service: auth
            context: .
            dockerfile: services/auth/Dockerfile
          - service: booking
            context: .
            dockerfile: services/booking/Dockerfile
          - service: tracking
            context: .
            dockerfile: services/tracking/Dockerfile
          - service: notification
            context: .
            dockerfile: services/notification/Dockerfile
          - service: chat
            context: .
            dockerfile: services/chat/Dockerfile
          # MediaSoup is a standalone Node app; its Dockerfile uses paths
          # relative to services/mediasoup/ (matching docker-compose).
          - service: mediasoup
            context: services/mediasoup
            dockerfile: services/mediasoup/Dockerfile

    steps:
      - uses: actions/checkout@v4

      # ghcr.io requires repository path to be lowercase. `github.repository`
      # preserves the owner's casing (e.g. "WeiWutichai/guard-dispatch"), so
      # the tag "ghcr.io/WeiWutichai/..." is rejected at push time with
      # "repository name must be lowercase". Downcase here once, reuse below.
      - name: Compute lowercase image prefix
        run: |
          echo "IMAGE_PREFIX=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to Production Server
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/guard-dispatch
            git pull origin main
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
