# =============================================================================
# Security Guard Dispatch System — STAGING Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
#        docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Differences from dev (docker-compose.yml):
#   - All Rust + mediasoup services PULL pre-built images from ghcr.io
#     (published by .github/workflows/deploy.yml on every push to main).
#     `build: !reset null` cancels the build stanza inherited from the base
#     compose so `docker compose up` never rebuilds on the VPS.
#   - nginx uses nginx.prod.conf (HTTPS + HSTS + server_name bound)
#   - Let's Encrypt certs mounted read-only at /etc/letsencrypt
#   - Webroot for cert renewal mounted at /var/www/certbot
#   - MediaSoup ANNOUNCED_IP set to VPS public IP (required for WebRTC ICE)
#   - All services have restart: always
#   - MinIO kept enabled (staging still uses local object storage)
#   - Postgres/Redis/MinIO host ports removed (no public exposure)
#
# Image coords (REGISTRY, IMAGE_PREFIX, IMAGE_TAG) are exported by the
# .github/workflows/deploy.yml script on every run. The VPS .env does
# NOT need them — they're CI/CD concerns, not app config. For manual
# `docker compose up` on the host, export them yourself first or fall
# back to the base docker-compose.yml (which builds locally).
#
# Production will eventually use docker-compose.prod.yml with Cloudflare R2.
# =============================================================================

services:

  nginx-gateway:
    restart: always
    volumes:
      # Mount the production nginx config (NOT the dev one)
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt live + archive directories (read-only)
      # nginx.prod.conf references /etc/letsencrypt/live/pguard.innoveraappcenter.com/
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # ACME webroot for future certbot renewals (if we switch from standalone)
      - /var/www/certbot:/var/www/certbot:ro

  web-admin:
    restart: always
    # Join the backend network so Next.js rewrites() can reach each
    # Rust service container directly by its service name, bypassing
    # nginx's HTTP→HTTPS redirect for internal traffic.
    networks:
      - frontend
      - backend
    build:
      # Server-only service URLs — NOT prefixed NEXT_PUBLIC_ to prevent
      # accidental client-side exposure of internal Docker hostnames.
      args:
        NEXT_PUBLIC_BASE_PATH: /p-guard-app
        AUTH_SERVICE_URL: http://rust-auth:3001
        BOOKING_SERVICE_URL: http://rust-booking:3002
        TRACKING_SERVICE_URL: http://rust-tracking:3003
        NOTIFICATION_SERVICE_URL: http://rust-notification:3004
        CHAT_SERVICE_URL: http://rust-chat:3006

  rust-auth:
    restart: always
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX required}/auth:${IMAGE_TAG:-latest}
    build: !reset null

  rust-booking:
    restart: always
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX required}/booking:${IMAGE_TAG:-latest}
    build: !reset null

  rust-tracking:
    restart: always
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX required}/tracking:${IMAGE_TAG:-latest}
    build: !reset null

  rust-notification:
    restart: always
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX required}/notification:${IMAGE_TAG:-latest}
    build: !reset null

  rust-chat:
    restart: always
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX required}/chat:${IMAGE_TAG:-latest}
    build: !reset null

  mediasoup-server:
    restart: always
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX required}/mediasoup:${IMAGE_TAG:-latest}
    build: !reset null
    environment:
      # Required for WebRTC ICE to advertise the correct public IP.
      # Without this, mobile clients can't connect to the media server
      # because they'd try to reach the Docker internal IP.
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP}
      MEDIASOUP_LISTEN_IP: ${MEDIASOUP_LISTEN_IP:-0.0.0.0}
      MEDIASOUP_RTC_MIN_PORT: ${MEDIASOUP_RTC_MIN_PORT:-40000}
      MEDIASOUP_RTC_MAX_PORT: ${MEDIASOUP_RTC_MAX_PORT:-40499}
      NODE_ENV: ${NODE_ENV:-production}

  postgres-db:
    restart: always
    # Remove any host port exposure — internal network only
    ports: !reset []

  redis-cache:
    restart: always
    ports: !reset []

  redis-pubsub:
    restart: always
    ports: !reset []

  minio:
    restart: always
    # Keep MinIO enabled for staging. Remove host port exposure — access via
    # /minio-files/ proxy on nginx instead.
    ports: !reset []
